<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pixel Voices - Redirecting</title>
  <script>
    (function() {
      var basePath = '/pixelvoices';
      var path = window.location.pathname;
      var redirectPath = path.indexOf(basePath) === 0 ? path : basePath + '/';
      var target = basePath + '/?redirect=' + encodeURIComponent(redirectPath + window.location.search + window.location.hash);
      window.location.replace(target);
    }());
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
